# Coolify deployment stack — one application, four services.
#
# Why a compose stack instead of a single image with supervisord:
#   - Coolify treats this stack as ONE application (single panel of logs,
#     one redeploy button, one set of env vars), which is the management
#     experience the user actually asked for.
#   - Each service can be restarted/rebuilt independently. Restarting
#     Pocketbase doesn't restart Next.js. Pulling a new dashboard image
#     doesn't disturb MinIO.
#   - ARM-native images for every piece (Pocketbase, MinIO, Caddy,
#     Alpine cron all publish linux/arm64). Tested on Oracle Ampere A1.
#
# Volumes are bind-mounted to /data/* on the host so Coolify's snapshot
# tooling can back up the whole VPS at once. Adjust paths if your
# Coolify install uses a different convention.

services:

  # ── Reverse proxy + TLS ──────────────────────────────────────────
  # Caddy fronts everything on the public domain. Subpath routing keeps
  # cookies/CORS on the single origin so the dashboard, Pocketbase, and
  # MinIO can talk over `fetch()` without preflight headaches.
  #
  # In Coolify's default install the platform-level Traefik proxy will
  # also be in front of this — that's fine; Caddy here just handles
  # the internal routing and lets Coolify route the public domain to
  # port 80 of this container.
  caddy:
    # Custom image with the Caddyfile baked in. Coolify doesn't sync
    # the rest of the repo to its runtime directory, so bind-mounting
    # the Caddyfile fails ("not a directory" — Docker auto-creates an
    # empty dir at the missing source path). Building it into the
    # image sidesteps the issue entirely.
    build:
      context: ./coolify/caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    # NO host port bindings — Coolify's Traefik handles public
    # 80/443. Coolify routes the application's domain to caddy:80
    # automatically when SERVICE_FQDN_CADDY is set in the env.
    expose:
      - "80"
    volumes:
      - /data/caddy/data:/data
      - /data/caddy/config:/config
    environment:
      # SERVICE_FQDN_CADDY is auto-substituted by Coolify with the
      # application's primary domain. Caddy uses it as `{$DOMAIN}` in
      # the Caddyfile. Local docker-compose users set DOMAIN explicitly.
      DOMAIN: ${SERVICE_FQDN_CADDY:-${DOMAIN}}
    depends_on:
      - dashboard
      - pocketbase
      - minio
    # Attach to BOTH networks: internal so Caddy can reach dashboard/pb/
    # minio, AND `coolify` so Coolify's Traefik proxy can reach Caddy.
    # Without the coolify attachment, Traefik discovers Caddy via the
    # traefik.enable=true label but can't route to it → HTTPS requests
    # hang until the client timeout.
    networks: [yt_agent_net, coolify]

  # ── Next.js dashboard ────────────────────────────────────────────
  # Built from the project's web/ directory. Multi-stage Dockerfile
  # produces a slim standalone server (next.config -> output: 'standalone').
  dashboard:
    build:
      # Coolify sets --project-directory to the repo root, so ALL
      # relative paths (build contexts, volume bind mounts) are resolved
      # from there — NOT from this compose file's location. So we use
      # "." for the repo root and "./coolify/..." for everything inside
      # this subfolder.
      context: .
      dockerfile: coolify/Dockerfile.dashboard
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # ── Public origin — used by OAuth routes to build callback URLs.
      # Behind a reverse proxy (Caddy → Traefik) `req.nextUrl.origin`
      # resolves to the internal docker hostname (http://0.0.0.0:3000)
      # which isn't reachable from Google/GitHub/HF. Set this to the
      # public URL of the dashboard.
      PUBLIC_BASE_URL: ${SERVICE_FQDN_CADDY:-https://${DOMAIN}}
      # ── Pocketbase connection (internal hostname; not exposed) ──
      # Server-side Next.js code uses PB_URL_INTERNAL to hit Pocketbase
      # directly inside the docker network. The browser uses
      # NEXT_PUBLIC_PB_URL which goes through Caddy.
      # Tell the dashboard to use Pocketbase (not Firestore).
      DB_BACKEND: pocketbase
      PB_URL_INTERNAL: http://pocketbase:8090
      NEXT_PUBLIC_PB_URL: ${NEXT_PUBLIC_PB_URL:-/pb}
      # PB_SERVER_TOKEN is optional — if blank, the dashboard logs in
      # as the superuser with POCKETBASE_ADMIN_EMAIL/PASSWORD and caches
      # the token.
      PB_SERVER_TOKEN: ${PB_SERVER_TOKEN}
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      # ── Storage (default: MinIO via internal hostname) ──
      # First-deploy fallback. Once the user configures providers via
      # the /storage page, the storage registry takes over.
      S3_ENDPOINT_INTERNAL: http://minio:9000
      NEXT_PUBLIC_S3_PUBLIC_BASE: ${NEXT_PUBLIC_S3_PUBLIC_BASE}
      S3_BUCKET: ${S3_BUCKET:-yt-agent-videos}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # ── OAuth ──
      YOUTUBE_OAUTH_CLIENT_ID: ${YOUTUBE_OAUTH_CLIENT_ID}
      YOUTUBE_OAUTH_CLIENT_SECRET: ${YOUTUBE_OAUTH_CLIENT_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      HUGGINGFACE_OAUTH_CLIENT_ID: ${HUGGINGFACE_OAUTH_CLIENT_ID:-}
      HUGGINGFACE_OAUTH_CLIENT_SECRET: ${HUGGINGFACE_OAUTH_CLIENT_SECRET:-}
      # ── Cron + worker auth ──
      RENDER_TRIGGER_KEY: ${RENDER_TRIGGER_KEY}
      # ── Storage provider credential encryption ──
      STORAGE_PROVIDERS_ENC_KEY: ${STORAGE_PROVIDERS_ENC_KEY}
      # ── External launch URLs ──
      NEXT_PUBLIC_COLAB_URL: ${NEXT_PUBLIC_COLAB_URL:-}
      NEXT_PUBLIC_HF_SPACE_URL: ${NEXT_PUBLIC_HF_SPACE_URL:-}
      # ── Node ──
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - pocketbase
      - minio
    networks: [yt_agent_net]

  # ── Pocketbase ───────────────────────────────────────────────────
  # SQLite-backed DB with realtime SSE + admin UI + auth, all in one
  # ~30 MB binary. Migrations in coolify/pocketbase/pb_migrations/ are
  # auto-applied on boot.
  pocketbase:
    # Custom image with pb_migrations/ baked in (same reason as caddy).
    build:
      context: ./coolify/pocketbase
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8090"
    volumes:
      - /data/pocketbase:/pb_data
    environment:
      # First-boot admin creation (idempotent — only fires when the
      # admins table is empty).
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
    command:
      - "serve"
      - "--http=0.0.0.0:8090"
      - "--dir=/pb_data"
      - "--migrationsDir=/pb_migrations"
    networks: [yt_agent_net]

  # ── MinIO ────────────────────────────────────────────────────────
  # S3-compatible object store. We serve the API on :9000 (proxied at
  # /s3/) and the admin console on :9001 (proxied at /minio/).
  #
  # Bucket creation + public-read policy on yt-agent-videos happens
  # in the minio-init one-shot below — MinIO doesn't ship a way to
  # declare buckets at boot natively.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    volumes:
      - /data/minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Console served on its own port so the API stays clean.
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN}/minio/
    command: ["server", "/data", "--console-address", ":9001"]
    networks: [yt_agent_net]

  # ── One-shot: create bucket + public-read policy ─────────────────
  # Runs once on stack-up, exits 0 when the bucket already exists.
  # Idempotent across redeploys.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until /usr/bin/mc alias set local http://minio:9000 \
            "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 2;
        done
        /usr/bin/mc mb --ignore-existing local/$$S3_BUCKET
        /usr/bin/mc anonymous set download local/$$S3_BUCKET
        echo "minio-init: bucket $$S3_BUCKET ready"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-yt-agent-videos}
    restart: "no"
    networks: [yt_agent_net]

  # ── Cron sidecar ─────────────────────────────────────────────────
  # Replaces the GitHub Actions cron triggers — same HTTP calls, just
  # fired from inside the stack instead of GitHub's servers.
  # Hit /api/maintenance/scheduled-render @ 09:00 UTC, /api/maintenance/
  # cleanup @ 05:00 UTC, /api/maintenance/needs-worker every 5 min.
  cron-sidecar:
    build:
      context: ./coolify/cron
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DASHBOARD_INTERNAL_URL: http://dashboard:3000
      RENDER_TRIGGER_KEY: ${RENDER_TRIGGER_KEY}
    depends_on:
      - dashboard
    networks: [yt_agent_net]

  # ── Side-worker ──────────────────────────────────────────────────
  # Oracle-hosted executor for publish_youtube + copy_storage jobs.
  # Never renders (no GPU on ARM anyway). Registers as tier='dashboard'
  # so the /api/jobs/claim route can route target='dashboard' jobs
  # here specifically. Users pick "Oracle side-worker" from the
  # Publish/Copy dropdown when they want the upload to run locally
  # instead of on Kaggle.
  side-worker:
    build:
      context: .
      dockerfile: coolify/side_worker/Dockerfile
    restart: unless-stopped
    environment:
      INSTANCE_LABEL: "Oracle side-worker"
      COOLIFY_BASE_URL: ${SERVICE_FQDN_CADDY:-https://${DOMAIN}}
      INTERNAL_DASHBOARD_URL: http://dashboard:3000
      PB_URL_INTERNAL: http://pocketbase:8090
      RENDER_TRIGGER_KEY: ${RENDER_TRIGGER_KEY}
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      STORAGE_PROVIDERS_ENC_KEY: ${STORAGE_PROVIDERS_ENC_KEY}
      # Shared Oracle unlock password. Set via Coolify env — every
      # channel that wants Oracle-as-fallback must store a hash of this
      # SAME value on their channel doc via the /channels edit form.
      # If unset, Oracle can only claim jobs whose channel has no
      # oracle_password_hash (i.e. jobs deliberately opened up).
      ORACLE_UNLOCK_PASSWORD: ${ORACLE_UNLOCK_PASSWORD:-}
      DB_BACKEND: pocketbase
    depends_on:
      - dashboard
      - pocketbase
    networks: [yt_agent_net]
    # Resource caps — the Oracle A1 VPS is shared with another site
    # (Playwright job scraper). Cap the render worker so a heavy render
    # never starves the other tenant.
    #   cpus=1.6      → 80% of the 2 vCPUs (leaves 0.4 for the neighbour)
    #   mem=6g        → half of the 12 GiB RAM
    #   cpu-shares=512 → half the default 1024, so kernel gives the
    #                    other site's containers priority under contention
    #   pids-limit=512 → contains a runaway subprocess fork bomb
    deploy:
      resources:
        limits:
          cpus: "1.6"
          memory: 6g
    cpu_shares: 512
    pids_limit: 512

networks:
  yt_agent_net:
    driver: bridge
  # Coolify's own shared network — Traefik reverse-proxy lives here.
  # Marked external so compose won't try to (re)create it.
  coolify:
    external: true
