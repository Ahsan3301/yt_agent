name: Scheduled render

on:
  schedule:
    # Fires every hour. The scheduled-render route reads each channel's
    # run_at_hour and only queues jobs for channels whose hour matches
    # the current UTC hour. Channels with run_at_hour==null preserve
    # the legacy 09:00-UTC behaviour.
    - cron: "0 * * * *"
  workflow_dispatch: {}  # allow manual "Run workflow" button

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel scheduled-render route
        env:
          VERCEL_BASE: ${{ vars.VERCEL_BASE_URL }}
          API_KEY: ${{ secrets.RENDER_TRIGGER_KEY }}
        run: |
          set -e
          if [ -z "$VERCEL_BASE" ]; then
            VERCEL_BASE="https://yt-agent-olive.vercel.app"
          fi
          if [ -z "$API_KEY" ]; then
            echo "::error::RENDER_TRIGGER_KEY secret not set"
            exit 1
          fi
          # Pass the current UTC hour so the route can filter channels
          # to those whose run_at_hour matches this tick.
          CURRENT_HOUR=$(date -u +%-H)
          echo "Triggering ${VERCEL_BASE}/api/maintenance/scheduled-render?hour=${CURRENT_HOUR}"
          response=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY}" \
            -w "\n%{http_code}" \
            "${VERCEL_BASE}/api/maintenance/scheduled-render?hour=${CURRENT_HOUR}")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -ge 300 ]; then
            echo "::error::scheduled-render returned $code"
            exit 1
          fi
