name: Scheduled render

on:
  schedule:
    # 09:00 UTC daily. Adjust the cron string for your channel timezone.
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # allow manual "Run workflow" button

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel scheduled-render route
        env:
          VERCEL_BASE: ${{ vars.VERCEL_BASE_URL }}
          API_KEY: ${{ secrets.RENDER_TRIGGER_KEY }}
        run: |
          set -e
          if [ -z "$VERCEL_BASE" ]; then
            VERCEL_BASE="https://yt-agent-olive.vercel.app"
          fi
          if [ -z "$API_KEY" ]; then
            echo "::error::RENDER_TRIGGER_KEY secret not set"
            exit 1
          fi
          echo "Triggering ${VERCEL_BASE}/api/maintenance/scheduled-render"
          response=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY}" \
            -w "\n%{http_code}" \
            "${VERCEL_BASE}/api/maintenance/scheduled-render")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -ge 300 ]; then
            echo "::error::scheduled-render returned $code"
            exit 1
          fi
