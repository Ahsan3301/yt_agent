name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Skip kokoro / paramiko / boto3 / firebase-admin install latency
          # in CI by using a slim runtime requirements set for tests.
          pip install pytest ruff
          # Install only what tests actually import (avoid the full requirements
          # to keep CI fast; tests import a small surface).
          pip install Pillow requests python-dotenv truststore

      - name: Ruff lint
        run: |
          ruff check backend/ modules/ main.py || echo "::warning::ruff issues found (non-blocking for now)"

      - name: Pytest
        run: |
          # tests/ uses sys.path.insert to find the project root; no
          # conftest yet. Run with -q + ignore missing modules.
          pytest tests/ -q --no-header --tb=short -W ignore::DeprecationWarning \
            || echo "::warning::some tests failed (non-blocking until baseline is set)"

  web:
    name: Web build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build
